<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>practicl 1</title>


	<style>
		*{
			box-sizing: border-box;
			margin: 0px;
		}
		.header{
			height: 10vh;
			width: 100%;
		}
		.logo{
			height: 100%;
			width:20%;
			float: left;
			font-size: 20px;
			border: 4px solid darkred;
			text-align: center;
			padding-top: 20px;
		}
		.btn a{
			margin-left: 20px;
		}
		.btn{
			width:80%;
			height: 100%;
			float: left;
			font-size: 20px;
			border: 4px solid darkblue;
			padding: 25px 35px;
		}
		.main{
			height:80vh;
			width:100%;

		}
		.left{
			height:100%;
			width:30%;
			border:4px solid yellow;
			float: left;
		}
		.list{
			border:2px solid black;
			padding:25px;
			margin: 20px;
			text-align: center;
			font-size:20px;
		}
		.right{
			height: 100%;
			width:70%;
			float: left;
			border: 4px solid forestgreen;
		}
		.up{
			height:45%;
			width: 90%;
			border: 4px solid purple;
			margin: 20px;
			margin-left: 55px;
		}
		.bottom{
			height:45%;
			width:90%;
			border: 4px solid purple;
			margin-left: 55px;
		}
		.u1{
			border: 3px dotted darkred;
			float: left;
			height:50%;
			width:35%;
			margin:50px;
		}
		
		.u2{
			border:3px dotted darkred;
			height: 50%;
			width: 35%;
			float: left;
			margin: 50px;
		}
		.b1{
			height:50%;
			width: 22%;
			border: 4px dotted darkred;
			margin: 50px;
			float: left;
		}
		.b2{
			height:50%;
			width: 22%;
			border: 4px dotted darkred;
			margin: 50px;
			float: left;
		}

		.b3{
			height:50%;
			width: 22%;
			border: 4px dotted darkred;
			margin: 50px;
			float: left;
		}
		.footer{
			height:10vh;
			width:100%;
			text-align: center;
			margin:20px;
			margin-top: 50px;
		}
	</style>
</head>
<body>
	<div class="header">
		<div class="logo">Logo Here</div>
		<div class="btn">
			<a href="#">Home</a>
			<a href="#">About</a>
			<a href="#">Contact</a>
		</div>

		<div class="main">
			<div class="left">

				<div class="list">RESULT</div>
				<div class="list">APPLY</div>
				<div class="list">PLACEMENT</div>
				<div class="list">RECRUTMENT</div>
				<div class="list">NEWS</div>

			</div>

			<div class="right">
				<div class="up">
					<div class="u1"></div>
					<div class="u2"></div>
				</div>

				<div class="bottom">
					<div class="b1"></div>
					<div class="b2"></div>
					<div class="b3"></div>
				</div>
			</div>


		</div>
		<div class="footer">Footer</div>
	</div>
</body>
</html>
